name: Fetch Gauge Data
on:
  push:
    paths:
      - 'data/floods.geojson'
      - 'gauge_fetch.py'
      - 'gauge_flood_join.py'
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run gauge fetch
        run: python gauge_fetch.py
      - name: Join gauges to flood events
        run: python gauge_flood_join.py --radius 50
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gauges_current.json data/gauges_alerts.json data/gauges_history.csv \
                  data/gauges_current.geojson data/gauges_with_floods.json \
                  data/gauges_with_floods.csv data/gauges_with_floods.geojson
          git commit -m "Automated gauge data update [skip ci]" || echo "No changes to commit"
          git push
