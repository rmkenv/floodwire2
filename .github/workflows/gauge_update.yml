name: Fetch Gauge Data

on:
  push:
    paths:
      - 'data/floods.geojson'
      - 'gauge_fetch.py'
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual run from the Actions tab

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run gauge fetch
        run: python gauge_fetch.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Add all generated data files
          git add data/gauges_current.json data/gauges_alerts.json data/gauges_history.csv data/gauges_current.geojson
          # Only commit if there are actual changes
          git commit -m "Automated gauge data update [skip ci]" || echo "No changes to commit"
          git push
